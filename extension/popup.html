<!DOCTYPE html>
<html>

<head>
  <title>Locator Action Automator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════
       DESIGN TOKENS
    ══════════════════════════════════════════ */
    :root {
      --bg-0: #0b0d14;
      --bg-1: #10131e;
      --bg-2: #151826;
      --bg-3: #1c2033;
      --bg-4: #222741;
      --bg-inp: #1a1e30;

      --border: #252b45;
      --border-h: #3d4468;

      --accent: #5c72f0;
      --accent-l: #7c8ff4;
      --accent-g: rgba(92, 114, 240, .22);

      --green: #3ecf8e;
      --green-d: #27a368;
      --green-g: rgba(62, 207, 142, .25);

      --red: #f06060;
      --red-d: #c03030;
      --red-g: rgba(240, 96, 96, .25);

      --amber: #f0a040;
      --amber-g: rgba(240, 160, 64, .2);

      --cyan: #40c4d8;
      --purple: #a060f0;
      --pink: #e060a0;

      --txt-0: #eef0fa;
      --txt-1: #9ba3cc;
      --txt-2: #555e88;
      --txt-3: #343a5a;

      --r: 7px;
      --r2: 5px;
      --r3: 4px;

      --trans: .18s ease;
    }

    /* ══════════════════════════════════════════
       RESET & BASE
    ══════════════════════════════════════════ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-0);
      color: var(--txt-0);
      width: 660px;
      font-size: 12px;
      line-height: 1.45;
      overflow: hidden;
    }

    /* ══════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════ */
    .hdr {
      background: linear-gradient(160deg, var(--bg-3) 0%, var(--bg-2) 100%);
      border-bottom: 1px solid var(--border);
      padding: 9px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .hdr-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hdr-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-icon {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent) 0%, #8a50f0 100%);
      border-radius: var(--r2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      box-shadow: 0 0 16px var(--accent-g), 0 2px 6px rgba(0, 0, 0, .4);
    }

    .app-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .2px;
      color: var(--txt-0);
    }

    .app-sub {
      font-size: 10px;
      color: var(--txt-2);
      margin-top: 1px;
    }

    .hdr-pill {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .7px;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 99px;
    }

    .pill-steps {
      background: rgba(92, 114, 240, .15);
      color: var(--accent-l);
      border: 1px solid rgba(92, 114, 240, .35);
    }

    .pill-kb {
      background: rgba(255, 255, 255, .05);
      color: var(--txt-2);
      border: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
    }

    /* ══════════════════════════════════════════
       PROGRESS BAR
    ══════════════════════════════════════════ */
    .progress-track {
      height: 3px;
      background: var(--bg-1);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      transition: width .4s ease;
      box-shadow: 0 0 8px var(--accent-g);
    }

    #progress-bar.indeterminate {
      width: 35%;
      animation: indeterminate 1.4s infinite ease-in-out;
    }

    @keyframes indeterminate {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(340%);
      }
    }

    /* ══════════════════════════════════════════
       COL HEADER
    ══════════════════════════════════════════ */
    .col-hdr {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: var(--bg-1);
      border-bottom: 1px solid var(--border);
    }

    .col-hdr span {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .9px;
      text-transform: uppercase;
      color: var(--txt-3);
    }

    .ch-num {
      width: 22px;
      flex-shrink: 0;
    }

    .ch-type {
      width: 86px;
      flex-shrink: 0;
    }

    .ch-loc {
      flex: 1.2;
      min-width: 0;
    }

    .ch-action {
      width: 130px;
      flex-shrink: 0;
    }

    .ch-val {
      flex: 1;
      min-width: 0;
    }

    .ch-ctrl {
      width: 50px;
      flex-shrink: 0;
      text-align: right;
    }

    /* ══════════════════════════════════════════
       STEP LIST
    ══════════════════════════════════════════ */
    #locator-section {
      max-height: 300px;
      overflow-y: auto;
      padding: 6px 10px;
      background: var(--bg-0);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #locator-section::-webkit-scrollbar {
      width: 4px;
    }

    #locator-section::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    /* empty state */
    #empty-hint {
      display: none;
      text-align: center;
      padding: 28px 0 20px;
      color: var(--txt-2);
      font-size: 11px;
    }

    #empty-hint .empty-icon {
      font-size: 28px;
      margin-bottom: 6px;
    }

    #empty-hint p {
      line-height: 1.8;
    }

    /* ══════════════════════════════════════════
       ROW
    ══════════════════════════════════════════ */
    .row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 4px;
      padding: 5px 8px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: var(--r);
      transition: border-color var(--trans), box-shadow var(--trans),
        opacity .15s, transform .15s;
      animation: rowSlideIn .18s ease;
    }

    @keyframes rowSlideIn {
      from {
        opacity: 0;
        transform: translateY(-6px) scale(.98);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .row:hover {
      border-color: var(--border-h);
      box-shadow: 0 0 0 1px rgba(92, 114, 240, .12), 0 2px 8px rgba(0, 0, 0, .3);
    }

    .row.row-removing {
      opacity: 0;
      transform: scale(.97) translateX(8px);
    }

    /* step number */
    .row-num {
      width: 20px;
      flex-shrink: 0;
      font-size: 9px;
      font-weight: 700;
      color: var(--txt-3);
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
    }

    /* action type dot (color chip left of the type select) */
    .action-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background var(--trans);
    }

    /* ══════════════════════════════════════════
       FORM CONTROLS INSIDE ROWS
    ══════════════════════════════════════════ */
    .row select,
    .row input[type="text"],
    .row input[type="number"],
    .row input:not([type]) {
      background: var(--bg-inp);
      border: 1px solid var(--border);
      border-radius: var(--r3);
      color: var(--txt-0);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      padding: 4px 6px;
      outline: none;
      transition: border-color var(--trans), box-shadow var(--trans);
      flex-shrink: 0;
    }

    .row select:focus,
    .row input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-g);
    }

    .row select option {
      background: var(--bg-inp);
    }

    .row select:disabled,
    .row input:disabled {
      background: #0e101a;
      color: var(--txt-3);
      cursor: not-allowed;
      border-color: var(--border);
    }

    .row select.locatorType {
      width: 82px;
    }

    .row input.locatorValue {
      flex: 1.2;
      min-width: 60px;
      max-width: 180px;
    }

    .row select.action {
      width: 130px;
    }

    .row input.actionValue {
      flex: 1;
      min-width: 60px;
      max-width: 130px;
    }

    .row input.waitTime {
      width: 68px;
    }

    .row input.incrementStart {
      width: 56px;
    }

    /* random checkbox */
    .random-checkbox-label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--txt-1);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .random-checkbox {
      accent-color: var(--accent-l);
      width: 12px;
      height: 12px;
      cursor: pointer;
    }

    /* row buttons */
    .row-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      margin-left: auto;
    }

    .row-btn {
      width: 22px;
      height: 22px;
      border: none;
      border-radius: var(--r3);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background var(--trans), transform .1s;
    }

    .row-btn:active {
      transform: scale(.9);
    }

    .btn-remove {
      background: rgba(240, 96, 96, .13);
      color: var(--red);
      border: 1px solid rgba(240, 96, 96, .28);
    }

    .btn-remove:hover {
      background: rgba(240, 96, 96, .28);
    }

    .btn-add {
      background: rgba(92, 114, 240, .13);
      color: var(--accent-l);
      border: 1px solid rgba(92, 114, 240, .28);
    }

    .btn-add:hover {
      background: rgba(92, 114, 240, .28);
    }

    /* ══════════════════════════════════════════
       DIVIDER
    ══════════════════════════════════════════ */
    .div-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border) 30%, var(--border) 70%, transparent);
    }

    /* ══════════════════════════════════════════
       CONTROLS PANEL
    ══════════════════════════════════════════ */
    #controls {
      background: var(--bg-2);
      border-top: 1px solid var(--border);
      padding: 9px 14px 11px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: nowrap;
    }

    .spacer {
      flex: 1;
    }

    /* loop block */
    .loop-block {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 4px 10px;
    }

    .loop-lbl {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .7px;
      text-transform: uppercase;
      color: var(--txt-2);
      white-space: nowrap;
    }

    #loop-count {
      width: 60px;
      background: var(--bg-inp);
      border: 1px solid var(--border);
      border-radius: var(--r3);
      color: var(--txt-0);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 3px 7px;
      outline: none;
      transition: border-color var(--trans), box-shadow var(--trans);
    }

    #loop-count:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-g);
    }

    #loop-count:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    #loop-status {
      font-size: 10px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--txt-2);
      white-space: nowrap;
      min-width: 44px;
      text-align: center;
      padding: 2px 0;
      transition: color var(--trans);
    }

    #loop-status.running {
      color: var(--green);
    }

    /* ghost buttons */
    .ctrl-btn {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 11px;
      border: 1px solid var(--border);
      border-radius: var(--r2);
      background: var(--bg-3);
      color: var(--txt-1);
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background var(--trans), border-color var(--trans),
        color var(--trans), transform .1s;
    }

    .ctrl-btn:hover {
      background: var(--bg-4);
      border-color: var(--border-h);
      color: var(--txt-0);
    }

    .ctrl-btn:active {
      transform: scale(.95);
    }

    /* main action btn */
    #action-btn {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 20px;
      border: none;
      border-radius: var(--r2);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      letter-spacing: .4px;
      transition: box-shadow var(--trans), transform .1s, background var(--trans);
    }

    #action-btn:active {
      transform: scale(.95);
    }

    #action-btn.start-state {
      background: linear-gradient(135deg, var(--green), var(--green-d));
      color: #fff;
      box-shadow: 0 2px 14px var(--green-g);
    }

    #action-btn.start-state:hover {
      box-shadow: 0 4px 22px var(--green-g);
    }

    #action-btn.stop-state {
      background: linear-gradient(135deg, var(--red), var(--red-d));
      color: #fff;
      box-shadow: 0 2px 14px var(--red-g);
    }

    #action-btn.stop-state:hover {
      box-shadow: 0 4px 22px var(--red-g);
    }

    /* pulse dot */
    .pulse-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: none;
      flex-shrink: 0;
      animation: dot-pulse 1.1s infinite;
    }

    #action-btn.stop-state .pulse-dot {
      display: inline-block;
      background: rgba(255, 255, 255, .85);
    }

    @keyframes dot-pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.5);
        opacity: .5;
      }
    }

    /* ══════════════════════════════════════════
       STATUS BAR
    ══════════════════════════════════════════ */
    #status-message {
      display: none;
      font-size: 11px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: var(--r3);
      border-left: 3px solid transparent;
      animation: statusIn .2s ease;
    }

    @keyframes statusIn {
      from {
        opacity: 0;
        transform: translateY(-3px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    #status-message.success {
      background: rgba(62, 207, 142, .1);
      color: #6ee7b7;
      border-left-color: var(--green);
    }

    #status-message.error {
      background: rgba(240, 96, 96, .1);
      color: #fca5a5;
      border-left-color: var(--red);
    }

    #status-message.running {
      background: rgba(240, 160, 64, .1);
      color: #fcd34d;
      border-left-color: var(--amber);
    }

    /* hidden file input */
    #file-input {
      display: none;
    }
  </style>
  <base target="_blank">
</head>

<body>

  <!-- ════════════ HEADER ════════════ -->
  <div class="hdr">
    <div class="hdr-left">
      <div class="app-icon">LAA</div>
      <div>
        <div class="app-name">Locator Action Automator</div>
        <div class="app-sub">Browser workflow automation engine</div>
      </div>
    </div>
    <div class="hdr-right">
      <span id="step-count-pill" class="hdr-pill pill-steps">0 Steps</span>
      <span class="hdr-pill pill-kb" title="Keyboard shortcut: Ctrl+Enter to Start/Stop">Ctrl+Enter</span>
    </div>
  </div>

  <!-- ════════════ PROGRESS BAR ════════════ -->
  <div class="progress-track">
    <div id="progress-bar"></div>
  </div>

  <!-- ════════════ COLUMN LABELS ════════════ -->
  <div class="col-hdr">
    <span class="ch-num">#</span>
    <span class="ch-type">Type</span>
    <span class="ch-loc">Locator</span>
    <span class="ch-action">Action</span>
    <span class="ch-val">Value / Config</span>
    <span class="ch-ctrl">Ctrl</span>
  </div>

  <!-- ════════════ STEP ROWS ════════════ -->
  <div id="locator-section">
    <div id="empty-hint">
      <div class="empty-icon">[+]</div>
      <p>No steps yet.<br>Click <strong>Add Step</strong> below to get started.</p>
    </div>
  </div>

  <div class="div-line"></div>

  <!-- ════════════ CONTROLS ════════════ -->
  <div id="controls">
    <div class="ctrl-row">

      <!-- Loop block -->
      <div class="loop-block">
        <span class="loop-lbl">Loops</span>
        <input type="number" id="loop-count" placeholder="1" min="1" value="">
        <span id="loop-status">0/0</span>
      </div>

      <div class="spacer"></div>

      <button id="add-first" class="ctrl-btn" title="Add a new step">+ Add Step</button>
      <button id="import" class="ctrl-btn" title="Import tasks from JSON">&uarr; Import</button>
      <button id="export" class="ctrl-btn" title="Export tasks to JSON">&darr; Export</button>
      <button id="reset" class="ctrl-btn" title="Clear all steps">&times; Reset</button>

      <button id="action-btn" class="start-state">
        <span class="pulse-dot"></span>
        <span id="action-btn-label">>> Start</span>
      </button>
    </div>

    <!-- Status message -->
    <div id="status-message"></div>
  </div>

  <input type="file" id="file-input" accept=".json">
  <script src="popup.js"></script>
</body>

</html>
